<!DOCTYPE html>
<html>
<head>
    <title> Pong </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { cursor: none; } /* Esconde o cursor do mouse sob o jogo */
    </style>
</head>

<body>
    <canvas id="canvas" width="700" height="600"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // --- Game State Variables ---
        let ballX = 350, ballY = 350;
        let ballSpeedX = 4, ballSpeedY = 4;
        let playerY = 300;
        let computerY = 300;
        let playerScore = 0;
        let isGameOver = false;

        const PADDLE_HEIGHT = 70;
        const GAME_TOP = 140;
        const GAME_BOTTOM = 510;
        const LEFT_WALL = 50;
        const RIGHT_WALL = 650;

        function resetBall() {
            ballX = 350;
            ballY = 325;
            ballSpeedX = -ballSpeedX; // Manda em direção ao jogador que perdeu
        }

        var drawBackground = function() {
            ctx.fillStyle = 'Gold';
            ctx.fillRect(0, 0, 700, 600);
        };

        var drawGameName = function () {
            ctx.font = "70px Jaro";
            ctx.fillStyle = "Black";
            ctx.textAlign = "center";
            ctx.textBaseline = "top";
            ctx.fillText("PONG", 350, 20);
        };

        var drawGameBoard = function(x,y,width,height,radius,fill) {
            ctx.fillStyle = fill;
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.arcTo(x + width, y, x + width, y + radius, radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
            ctx.lineTo(x + radius, y + height);
            ctx.arcTo(x, y + height, x, y + height - radius, radius);
            ctx.lineTo(x, y + radius);
            ctx.arcTo(x, y, x + radius, y, radius);
            ctx.fill();
        };

        var drawNet = function(){
            ctx.fillStyle = 'White';
            for(let i=0; i < 27; i++) {
                ctx.fillRect(350, 110 + 16*i, 4, 8);
            }
        };

        var drawRacket = function(x, y) {
            ctx.fillStyle = 'White';
            ctx.fillRect(x, y, 10, PADDLE_HEIGHT);
        };

        var drawScore = function(x,y) {
            ctx.fillStyle = "LightSlateGrey";
            ctx.font = "100px Jaro";
            ctx.textAlign = "right";
            ctx.fillText(playerScore, x, y);
        }

        var drawBall = function(x,y){
            ctx.fillStyle = 'White';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
        }

        function moveEverything() {
            if (isGameOver) return;

            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // O computador segue o centro da bola
            if (computerY + (PADDLE_HEIGHT/2) < ballY - 10) computerY += 4;
            else if (computerY + (PADDLE_HEIGHT/2) > ballY + 10) computerY -= 4;

            // Bate e vota nas bordas superior e inferior do jogo
            if (ballY < GAME_TOP + 10 || ballY > GAME_BOTTOM - 10) {
                ballSpeedY = -ballSpeedY;
            }

            // Colisão com a raquete esquerda (jogador)
            if (ballX < 90 && ballX > 75 && ballY > playerY && ballY < playerY + PADDLE_HEIGHT) {
                if(ballSpeedX < 0) { // evita bug na hora de contabilizar o score
                    ballSpeedX = -ballSpeedX;
                    playerScore++;
                    ballX = 90; // empurra para longe
                }
                

                // Podemos adicionar um nível de dificuldade aumentando a velocidade da bola a cada toque
                ballSpeedX *= 1.02;
            }

            // Colisão com a raquete direita (computador)
            if (ballX > 610 && ballX < 625 && ballY > computerY && ballY < computerY + PADDLE_HEIGHT) {
                ballSpeedX = -ballSpeedX;
                ballX = 610;
            }

            // Condições para Game Over
            if (ballX < LEFT_WALL || ballX > RIGHT_WALL) {
                isGameOver = true;
            }
        }

        function drawEverything() {
            drawBackground();

            drawGameName();
            drawGameBoard(50, 100, 600, 450, 30,'DarkSlateGrey');
            drawNet();
            drawScore(300,140);    

            drawRacket(80, playerY);
            drawRacket(610, computerY);

            drawBall(ballX, ballY);


            if (isGameOver) {
                playerScore = 0;
                drawGameBoard(50, 100, 600, 450, 30, "rgba(0,0,0,0.6)");
                ctx.fillStyle = "White";
                ctx.textAlign = "center";
                ctx.font = "50px Jaro";
                ctx.fillText("GAME OVER", 350, 280);
                ctx.font = "bold 18px Arial";
                ctx.fillText("Click to Restart", 350, 340);
            }
        }

        function gameLoop() {
            moveEverything();
            drawEverything();
            requestAnimationFrame(gameLoop);
        }

        // --- Movimentação das raquetes ---
        canvas.addEventListener('mousemove', function(evt) {
            let rect = canvas.getBoundingClientRect();
            let mouseY = evt.clientY - rect.top;
            playerY = mouseY - (PADDLE_HEIGHT / 2);
            
            // Limita as raquetes ao retângulo do jogo
            if (playerY < GAME_TOP) playerY = GAME_TOP;
            if (playerY > GAME_BOTTOM - PADDLE_HEIGHT) playerY = GAME_BOTTOM - PADDLE_HEIGHT;
        });

        canvas.addEventListener('mousedown', function() {
            if (isGameOver) {
                resetBall();
                isGameOver = false;
            }
        });

        // Start the engine
        gameLoop();
    </script>
</body>
</html>
