<!DOCTYPE html>
<html>
<head>
    <title> Pong </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jaro:opsz@6..72&display=swap" rel="stylesheet">
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        canvas { cursor: none; }
    </style>
</head>

<body>
    <canvas id="canvas" width="700" height="600"></canvas>

    <script src="https://code.jquery.com/jquery-2.1.0.js"></script>

    <script>
    // --- Configurações do Canvas---
    var canvas = document.getElementById("canvas");
    var ctx = canvas.getContext("2d");
    var width = canvas.width;
    var height = canvas.height;

    // --- Constantes de Jogo ---
    var PADDLE_HEIGHT = 70;
    var GAME_TOP = 140;
    var GAME_BOTTOM = 510;
    var LEFT_WALL = 50;
    var RIGHT_WALL = 650;
    
    var intervalId;
    var isGameOver = false;

    // --- Funções de Desenho de Ambiente ---
    var drawBackground = function () {
        ctx.fillStyle = 'Gold';
        ctx.fillRect(0, 0, width, height);
    };

    var drawGameName = function () {
        ctx.font = "70px Jaro";
        ctx.fillStyle = "Black";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText("PONG", 350, 20);
    };

    var drawGameBoard = function (x, y, w, h, radius, fill) {
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, radius);
        ctx.fill();
    };

    var drawNet = function () {
        ctx.fillStyle = 'White';
        for (var i = 0; i < 27; i++) {
            ctx.fillRect(350, 110 + 16 * i, 4, 8);
        }
    };

    var gameOver = function () {
        isGameOver = true;
        drawGameBoard(50, 100, 600, 450, 30, "rgba(0,0,0,0.6)");
        ctx.fillStyle = "White";
        ctx.textAlign = "center";
        ctx.font = "50px Jaro";
        ctx.fillText("GAME OVER", 350, 280);
        ctx.font = "bold 18px Arial";
        ctx.fillText("Click to Restart", 350, 340);
        clearInterval(intervalId);
    };

    // --- Construtor da Raquete ---
    var Paddle = function (x, y, isPlayer) {
        this.x = x;
        this.y = y;
        this.score = 0;
        this.isPlayer = isPlayer;
    };

    Paddle.prototype.draw = function () {
        ctx.fillStyle = 'White';
        ctx.fillRect(this.x, this.y, 10, PADDLE_HEIGHT);

        // Se for o jogador, desenha o score
        if (this.isPlayer) {
            ctx.fillStyle = "LightSlateGrey";
            ctx.font = "100px Jaro";
            ctx.textAlign = "right";
            ctx.fillText(this.score, 300, 140);
        }
    };

    Paddle.prototype.moveAI = function (ball) {
        var center = this.y + (PADDLE_HEIGHT / 2);
        if (center < ball.y - 10) this.y += 4;
        else if (center > ball.y + 10) this.y -= 4;

        this.limitBounds();
    };

    Paddle.prototype.limitBounds = function () {
        if (this.y < GAME_TOP) this.y = GAME_TOP;
        if (this.y > GAME_BOTTOM - PADDLE_HEIGHT) this.y = GAME_BOTTOM - PADDLE_HEIGHT;
    };

    // --- Construtor da Bola ---
    var Ball = function () {
        this.x = 350;
        this.y = 350;
        this.speedX = 3;
        this.speedY = 3;
        this.radius = 8;
    };

    Ball.prototype.draw = function () {
        ctx.fillStyle = 'White';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
        ctx.fill();
    };

    Ball.prototype.move = function (player, computer) {
        this.x += this.speedX;
        this.y += this.speedY;

        // Borda superior e inferior
        if (this.y < GAME_TOP + 10 || this.y > GAME_BOTTOM - 10) {
            this.speedY = -this.speedY;
        }

        // Colisão Raquete Jogador
        if (this.x < 90 && this.x > 65 && this.y > player.y && this.y < player.y + PADDLE_HEIGHT) {
            if (this.speedX < 0) {
                this.speedX = -this.speedX;
                player.score++;
                this.x = 90;
                this.speedX *= 1.05; // Aumento de dificuldade
            }
        }

        // Colisão Raquete Computador
        if (this.x > 610 && this.x < 635 && this.y > computer.y && this.y < computer.y + PADDLE_HEIGHT) {
            if (this.speedX > 0) {
                this.speedX = -this.speedX;
                this.x = 610;
            }
        }

        // Condição de Game Over
        if (this.x < LEFT_WALL || this.x > RIGHT_WALL) {
            gameOver();
        }
    };

    // --- Instanciação dos Objetos ---
    var player = new Paddle(80, 300, true);
    var computer = new Paddle(610, 300, false);
    var ball = new Ball();

    // --- Loop de Jogo (setInterval) ---
    var runGame = function () {
        isGameOver = false;
        intervalId = setInterval(function () {
            ctx.clearRect(0, 0, width, height);

            drawBackground();
            drawGameName();
            drawGameBoard(50, 100, 600, 450, 30, 'DarkSlateGrey');
            drawNet();

            ball.move(player, computer);
            computer.moveAI(ball);

            player.draw();
            computer.draw();
            ball.draw();

        }, 1000 / 60); // 60 FPS
    };

    // --- Manipulação de Eventos (jQuery) ---
    $("body").mousemove(function (event) {
        var rect = canvas.getBoundingClientRect();
        var mouseY = event.clientY - rect.top;
        player.y = mouseY - (PADDLE_HEIGHT / 2);
        player.limitBounds();
    });

    $(canvas).mousedown(function () {
        if (isGameOver) {
            player.score = 0;
            ball = new Ball();
            // Inverte a direção inicial
            ball.speedX = -4; 
            runGame();
        }
    });

    // Início
    runGame();

    </script>
</body>
</html>
